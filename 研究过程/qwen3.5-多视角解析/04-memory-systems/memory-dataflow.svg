      <text x="230" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">阈值定义 (autoCompact.ts)</text>

      <rect x="15" y="35" width="205" height="55" rx="3" fill="#d4edda" stroke="#28a745"/>
      <text x="117" y="55" text-anchor="middle" font-size="10" font-weight="bold" fill="#155724">AUTOCOMPACT_BUFFER</text>
      <text x="117" y="72" text-anchor="middle" font-size="11" fill="#155724" font-weight="bold">13,000 tokens</text>
      <text x="117" y="87" text-anchor="middle" font-size="9" fill="#555">自动压缩触发余量</text>

      <rect x="240" y="35" width="205" height="55" rx="3" fill="#fff3cd" stroke="#ffc107"/>
      <text x="342" y="55" text-anchor="middle" font-size="10" font-weight="bold" fill="#856404">WARNING_THRESHOLD</text>
      <text x="342" y="72" text-anchor="middle" font-size="11" fill="#856404" font-weight="bold">20,000 tokens</text>
      <text x="342" y="87" text-anchor="middle" font-size="9" fill="#555">警告阈值余量</text>

      <rect x="15" y="100" width="205" height="50" rx="3" fill="#f8d7da" stroke="#dc3545"/>
      <text x="117" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#721c24">ERROR_THRESHOLD</text>
      <text x="117" y="137" text-anchor="middle" font-size="11" fill="#721c24" font-weight="bold">20,000 tokens</text>
      <text x="117" y="150" text-anchor="middle" font-size="9" fill="#555">错误阈值余量</text>

      <rect x="240" y="100" width="205" height="50" rx="3" fill="#d1ecf1" stroke="#17a2b8"/>
      <text x="342" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c5460">MANUAL_COMPACT_BUFFER</text>
      <text x="342" y="137" text-anchor="middle" font-size="11" fill="#0c5460" font-weight="bold">3,000 tokens</text>
      <text x="342" y="150" text-anchor="middle" font-size="9" fill="#555">手动压缩余量</text>
    </g>

    <!-- Functions -->
    <g transform="translate(20, 165)">
      <rect x="0" y="0" width="460" height="140" rx="5" fill="#f8f9fa" stroke="#dee2e6"/>
      <text x="230" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">核心函数</text>

      <rect x="15" y="35" width="430" height="45" rx="3" fill="#e8f4fd" stroke="#4A90D9"/>
      <text x="230" y="55" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E6DA4">getEffectiveContextWindowSize(model)</text>
      <text x="230" y="72" text-anchor="middle" font-size="9" fill="#555">contextWindow - reservedTokensForSummary(20,000)</text>

      <rect x="15" y="85" width="430" height="45" rx="3" fill="#e8f5e9" stroke="#5CB85C"/>
      <text x="230" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#398439">getAutoCompactThreshold(model)</text>
      <text x="230" y="122" text-anchor="middle" font-size="9" fill="#555">effectiveContextWindow - AUTOCOMPACT_BUFFER(13k)</text>
    </g>
  </g>

  <!-- Middle: Memory Retrieval Flow -->
  <g transform="translate(1060, 80)">
    <rect x="0" y="0" width="320" height="580" rx="10" fill="#fff" stroke="#28a745" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="35" rx="10" fill="#28a745"/>
    <text x="160" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">记忆检索流程</text>

    <!-- Flow -->
    <g transform="translate(20, 50)">
      <!-- User Input -->
      <rect x="0" y="0" width="280" height="40" rx="20" fill="#667eea" stroke="#5a6fd6" stroke-width="2"/>
      <text x="140" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="white">用户输入</text>

      <line x1="140" y1="40" x2="140" y2="55" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Step 1 -->
      <rect x="0" y="55" width="280" height="50" rx="5" fill="#e8f4fd" stroke="#4A90D9" stroke-width="1.5"/>
      <text x="140" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E6DA4">1. 内存预取 (后台异步)</text>
      <text x="140" y="95" text-anchor="middle" font-size="9" fill="#555">startRelevantMemoryPrefetch()</text>

      <line x1="140" y1="105" x2="140" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Step 2 -->
      <rect x="0" y="120" width="280" height="50" rx="5" fill="#fef5e7" stroke="#F0AD4E" stroke-width="1.5"/>
      <text x="140" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#D58512">2. 技能发现预取</text>
      <text x="140" y="160" text-anchor="middle" font-size="9" fill="#555">startSkillDiscoveryPrefetch()</text>

      <line x1="140" y1="170" x2="140" y2="185" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Step 3 -->
      <rect x="0" y="185" width="280" height="50" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
      <text x="140" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="#155724">3. 附件处理</text>
      <text x="140" y="225" text-anchor="middle" font-size="9" fill="#555">getAttachmentMessages()</text>

      <line x1="140" y1="235" x2="140" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Step 4 -->
      <rect x="0" y="250" width="280" height="50" rx="5" fill="#fde8e8" stroke="#D9534F" stroke-width="1.5"/>
      <text x="140" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#C9302C">4. Session Memory</text>
      <text x="140" y="290" text-anchor="middle" font-size="9" fill="#555">trySessionMemoryCompaction()</text>

      <line x1="140" y1="300" x2="140" y2="315" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Step 5 -->
      <rect x="0" y="315" width="280" height="50" rx="5" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5"/>
      <text x="140" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c5460">5. 上下文构建</text>
      <text x="140" y="355" text-anchor="middle" font-size="9" fill="#555">合并所有记忆源 | 应用 token 预算</text>

      <!-- Legend -->
      <g transform="translate(0, 380)">
        <rect x="0" y="0" width="280" height="180" rx="5" fill="#f8f9fa" stroke="#dee2e6"/>
        <text x="140" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">压缩策略对比</text>

        <rect x="10" y="35" width="260" height="40" rx="3" fill="#fff3cd" stroke="#ffc107"/>
        <text x="140" y="52" text-anchor="middle" font-size="9" font-weight="bold" fill="#856404">Snip (快速删除)</text>
        <text x="140" y="67" text-anchor="middle" font-size="8" fill="#555">直接删除消息 | 不生成摘要</text>

        <rect x="10" y="80" width="260" height="40" rx="3" fill="#d4edda" stroke="#28a745"/>
        <text x="140" y="97" text-anchor="middle" font-size="9" font-weight="bold" fill="#155724">Microcompact (微压缩)</text>
        <text x="140" y="112" text-anchor="middle" font-size="8" fill="#555">小范围压缩 | 缓存编辑</text>

        <rect x="10" y="125" width="260" height="40" rx="3" fill="#e8f4fd" stroke="#4A90D9"/>
        <text x="140" y="142" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E6DA4">Autocompact (自动压缩)</text>
        <text x="140" y="157" text-anchor="middle" font-size="8" fill="#555">阈值触发 | LLM 生成摘要</text>
      </g>
    </g>
  </g>

  <!-- Bottom Left: Context Management -->
  <g transform="translate(20, 420)">
    <rect x="0" y="0" width="700" height="260" rx="10" fill="#fff" stroke="#764ba2" stroke-width="2"/>
    <rect x="0" y="0" width="700" height="35" rx="10" fill="#764ba2"/>
    <text x="350" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">上下文压缩流程 (Context Compaction)</text>

    <!-- Flow Diagram -->
    <g transform="translate(20, 50)">
      <!-- Original Messages -->
      <rect x="0" y="0" width="120" height="80" rx="5" fill="#e8f4fd" stroke="#4A90D9" stroke-width="2"/>
      <text x="60" y="30" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E6DA4">原始消息</text>
      <text x="60" y="50" text-anchor="middle" font-size="9" fill="#555">messages[]</text>
      <text x="60" y="65" text-anchor="middle" font-size="9" fill="#555">token 计数超限</text>

      <line x1="120" y1="40" x2="145" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Snip -->
      <rect x="145" y="0" width="120" height="80" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
      <text x="205" y="30" text-anchor="middle" font-size="10" font-weight="bold" fill="#856404">Snip</text>
      <text x="205" y="50" text-anchor="middle" font-size="9" fill="#555">删除旧消息</text>
      <text x="205" y="65" text-anchor="middle" font-size="9" fill="#555">tokensFreed = N</text>

      <line x1="265" y1="40" x2="290" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Microcompact -->
      <rect x="290" y="0" width="120" height="80" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
      <text x="350" y="30" text-anchor="middle" font-size="10" font-weight="bold" fill="#155724">Microcompact</text>
      <text x="350" y="50" text-anchor="middle" font-size="9" fill="#555">小范围压缩</text>
      <text x="350" y="65" text-anchor="middle" font-size="9" fill="#555">缓存边界检测</text>

      <line x1="410" y1="40" x2="435" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Autocompact -->
      <rect x="435" y="0" width="120" height="80" rx="5" fill="#fde8e8" stroke="#D9534F" stroke-width="2"/>
      <text x="495" y="30" text-anchor="middle" font-size="10" font-weight="bold" fill="#C9302C">Autocompact</text>
      <text x="495" y="50" text-anchor="middle" font-size="9" fill="#555">LLM 生成摘要</text>
      <text x="495" y="65" text-anchor="middle" font-size="9" fill="#555">post-compact messages</text>

      <line x1="555" y1="40" x2="580" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>

      <!-- Final Context -->
      <rect x="580" y="0" width="100" height="80" rx="5" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2"/>
      <text x="630" y="35" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c5460">最终上下文</text>
      <text x="630" y="55" text-anchor="middle" font-size="9" fill="#555">预算内</text>
      <text x="630" y="70" text-anchor="middle" font-size="9" fill="#555">发送给 LLM</text>

      <!-- Post-Cleanup -->
      <rect x="0" y="100" width="680" height="60" rx="5" fill="#f8f9fa" stroke="#dee2e6"/>
      <text x="340" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Post-Compact Cleanup</text>
      <text x="340" y="145" text-anchor="middle" font-size="9" fill="#555">runPostCompactCleanup() - 重置 collapse 状态 | 清理缓存 | 通知监听器</text>
    </g>

    <!-- Circuit Breaker -->
    <g transform="translate(20, 180)">
      <rect x="0" y="0" width="680" height="65" rx="5" fill="#fff3cd" stroke="#ffc107"/>
      <text x="340" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#856404">电路断路器 (Circuit Breaker)</text>
      <text x="340" y="40" text-anchor="middle" font-size="9" fill="#555">MAX_CONSECUTIVE_AUTOCOMPACT_FAILURES = 3</text>
      <text x="340" y="55" text-anchor="middle" font-size="9" fill="#555">防止无限重试：当上下文不可恢复地超限时停止压缩尝试</text>
    </g>
  </g>

  <!-- Bottom Right: Python MRE + Challenge -->
  <g transform="translate(740, 420)">
    <rect x="0" y="0" width="640" height="260" rx="10" fill="#2d2d2d" stroke="#555" stroke-width="2"/>
    <rect x="0" y="0" width="640" height="30" rx="10" fill="#404040"/>
    <text x="320" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#f8f8f2">Python MRE - 记忆系统</text>

    <text x="20" y="55" font-size="9" fill="#ff79c6">class TokenBudget:</text>
    <text x="35" y="70" font-size="9" fill="#f8f8f2">def __init__(self, max_tokens=100000):</text>
    <text x="50" y="85" font-size="9" fill="#f8f8f2">self.warning = max_tokens - 20000</text>
    <text x="50" y="100" font-size="9" fill="#f8f8f2">def check_status(self, used):</text>
    <text x="65" y="115" font-size="9" fill="#f8f8f2">return {'is_above_warning': used &gt;= self.warning}</text>

    <text x="20" y="140" font-size="9" fill="#ff79c6">class MemoryStore:</text>
    <text x="35" y="155" font-size="9" fill="#f8f8f2">entries: Dict[str, MemoryEntry]</text>
    <text x="35" y="170" font-size="9" fill="#f8f8f2">timeline: deque  # 时间线索引</text>
    <text x="35" y="185" font-size="9" fill="#f8f8f2">compressed: Dict[str, CompressedMemory]</text>
    <text x="35" y="200" font-size="9" fill="#f8f8f2">def compress(self, entries, compressor): ...</text>

    <text x="20" y="225" font-size="9" fill="#ff79c6">class ContextManager:</text>
    <text x="35" y="240" font-size="9" fill="#f8f8f2">async def add_message(self, role, content):</text>
    <text x="50" y="255" font-size="9" fill="#f8f8f2">self._maybe_auto_compress()</text>
  </g>

  <!-- Challenge -->
  <g transform="translate(740, 700)">
    <rect x="0" y="0" width="640" height="220" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <rect x="0" y="0" width="640" height="35" rx="10" fill="#ffc107"/>
    <text x="320" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">🤔 挑战性工程问题</text>

    <text x="320" y="60" text-anchor="middle" font-size="11" fill="#856404" font-weight="bold">问题：当前记忆系统设计的挑战</text>
    <text x="320" y="85" text-anchor="middle" font-size="9" fill="#555">1. 压缩质量不一致 - snip/micro/autocompact 产生的摘要质量参差不齐</text>
    <text x="320" y="100" text-anchor="middle" font-size="9" fill="#555">2. 记忆检索效率低 - 线性搜索在大规模记忆中效率低下</text>
    <text x="320" y="115" text-anchor="middle" font-size="9" fill="#555">3. 上下文污染 - 不相关信息可能混入压缩摘要</text>
    <text x="320" y="130" text-anchor="middle" font-size="9" fill="#555">4. 记忆一致性 - 多 agent 场景下记忆同步困难</text>

    <text x="320" y="155" text-anchor="middle" font-size="11" fill="#856404" font-weight="bold">思考：设计一个更智能的记忆系统</text>
    <text x="320" y="175" text-anchor="middle" font-size="9" fill="#555">候选方案：A) 语义压缩 (embedding)  B) 分层检索  C) 记忆评分权重  D) 记忆知识图谱</text>
    <text x="320" y="195" text-anchor="middle" font-size="9" fill="#555">要求：自动识别关键信息 | 高效检索 | 多 agent 共享 | 可解释性</text>
    <text x="320" y="210" text-anchor="middle" font-size="9" fill="#856404" font-weight="bold">评价维度：安全性 | 可扩展性 | 可观察性 | 性能损耗</text>
  </g>

  <!-- Harness Engineering Evaluation -->
  <g transform="translate(20, 700)">
    <rect x="0" y="0" width="320" height="220" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="35" rx="10" fill="#667eea"/>
    <text x="160" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Harness Engineering 评价</text>

    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="290" height="40" rx="5" fill="#f8f9fa" stroke="#dee2e6"/>
      <text x="145" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">可扩展性 ⭐⭐⭐⭐</text>
      <text x="145" y="38" text-anchor="middle" font-size="9" fill="#555">记忆存储后端抽象 | 压缩策略可插拔</text>

      <rect x="0" y="50" width="290" height="40" rx="5" fill="#f8f9fa" stroke="#dee2e6"/>
      <text x="145" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">安全边界 ⭐⭐⭐⭐</text>
      <text x="145" y="88" text-anchor="middle" font-size="9" fill="#555">敏感信息过滤 | paste store 隔离</text>


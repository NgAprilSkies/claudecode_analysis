<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950">
  <defs>
    <marker id="arrowD" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <linearGradient id="titleGradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="1400" height="60" fill="url(#titleGradD)"/>
  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">
    视角 D：记忆系统 (Memory Systems) - 上下文管理与压缩策略
  </text>

  <!-- Top Left: Memory Hierarchy -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="500" height="320" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
    <rect x="0" y="0" width="500" height="35" rx="10" fill="url(#memoryGrad)"/>
    <text x="250" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">记忆系统层次 (Memory Hierarchy)</text>

    <!-- L1: Short Term -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="460" height="60" rx="5" fill="#e8f4fd" stroke="#4A90D9" stroke-width="2"/>
      <text x="230" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E6DA4">L1: 短期记忆 (对话上下文)</text>
      <text x="230" y="42" text-anchor="middle" font-size="10" fill="#555">messages 数组 | tokenCountWithEstimation | 超出阈值触发压缩</text>

      <line x1="230" y1="60" x2="230" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>
    </g>

    <!-- L2: Medium Term -->
    <g transform="translate(20, 135)">
      <rect x="0" y="0" width="460" height="60" rx="5" fill="#fef5e7" stroke="#F0AD4E" stroke-width="2"/>
      <text x="230" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#D58512">L2: 中期记忆 (会话历史)</text>
      <text x="230" y="42" text-anchor="middle" font-size="10" fill="#555">history.jsonl | paste store | 项目级历史索引</text>

      <line x1="230" y1="60" x2="230" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>
    </g>

    <!-- L3: Long Term -->

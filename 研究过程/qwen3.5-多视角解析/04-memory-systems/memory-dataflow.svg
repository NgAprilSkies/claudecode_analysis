    <rect x="0" y="0" width="500" height="320" rx="10" fill="#fff" stroke="#ffc107" stroke-width="2"/>
    <rect x="0" y="0" width="500" height="35" rx="10" fill="#ffc107"/>
    <text x="250" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">Token 预算管理 (Token Budget)</text>


      <text x="230" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#C9302C">L4: 外部记忆 (按需加载)</text>
      <text x="230" y="42" text-anchor="middle" font-size="10" fill="#555">Session Memory | Relevant Memory Prefetch | Skill Discovery</text>

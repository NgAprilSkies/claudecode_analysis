      <text x="230" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">L3: 长期记忆 (持久化存储)</text>
      <text x="230" y="42" text-anchor="middle" font-size="10" fill="#555">CLAUDE.md | .claude/ 配置 | 技能库 | 插件配置</text>

      <line x1="230" y1="60" x2="230" y2="75" stroke="#666" stroke-width="2" marker-end="url(#arrowD)"/>
    </g>


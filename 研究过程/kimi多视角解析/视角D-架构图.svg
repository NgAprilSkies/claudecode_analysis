<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="shortTermGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4B5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD699;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="longTermGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8E6B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="persistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8D4E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">
    Claude Code 记忆系统架构图
  </text>

  <!-- ==================== Short Term Memory (Top) ==================== -->
  <rect x="50" y="60" width="1100" height="220" fill="url(#shortTermGrad)" stroke="#FFA500" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="600" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8B4513">
    短期记忆层 (Session Level) - In-Memory
  </text>

  <!-- Pending Buffer -->
  <rect x="80" y="100" width="200" height="150" fill="#FFF8DC" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="180" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513">Pending Buffer</text>
  <text x="180" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">pendingEntries: LogEntry[]</text>
  <text x="180" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">MAX_HISTORY_ITEMS: 100</text>
  <text x="180" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">双缓冲机制</text>
  <text x="180" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">增量写入</text>
  <text x="180" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/history.ts</text>

  <!-- FileStateCache -->
  <rect x="320" y="100" width="220" height="150" fill="#FFF8DC" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="430" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513">FileStateCache</text>
  <text x="430" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">LRU Cache</text>
  <text x="430" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">maxEntries: 100</text>
  <text x="430" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">maxSize: 25MB</text>
  <text x="430" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">路径规范化</text>
  <text x="430" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/utils/fileStateCache.ts</text>

  <!-- Context Builder -->
  <rect x="580" y="100" width="220" height="150" fill="#FFF8DC" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="690" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513">Context Builder</text>
  <text x="690" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">getSystemContext()</text>
  <text x="690" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">getUserContext()</text>
  <text x="690" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Memoization缓存</text>
  <text x="690" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Git状态快照</text>
  <text x="690" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/context.ts</text>

  <!-- Message Chain -->
  <rect x="840" y="100" width="220" height="150" fill="#FFF8DC" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="950" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513">Message Chain</text>
  <text x="950" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Message[] Array</text>
  <text x="950" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">parentUuid链表</text>
  <text x="950" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">User/Assistant/System</text>
  <text x="950" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Tool Results</text>
  <text x="950" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/utils/messages.ts</text>

  <!-- ==================== Context Management (Middle) ==================== -->
  <rect x="50" y="310" width="1100" height="240" fill="url(#compactGrad)" stroke="#FF1493" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="600" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8B008B">
    上下文管理与压缩层 (Context Management)
  </text>

  <!-- AutoCompact -->
  <rect x="80" y="360" width="200" height="165" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2" rx="5"/>
  <text x="180" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B008B">AutoCompact</text>
  <text x="180" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">阈值: 13K buffer</text>
  <text x="180" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Circuit Breaker: 3</text>
  <text x="180" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Fork Agent摘要</text>
  <text x="180" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">边界标记</text>
  <text x="180" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">~50K输出</text>
  <text x="180" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/services/compact/</text>

  <!-- MicroCompact -->
  <rect x="320" y="360" width="220" height="165" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2" rx="5"/>
  <text x="430" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B008B">MicroCompact</text>
  <text x="430" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Time-Based MC</text x="430" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">60分钟触发</text>
  <text x="430" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">保留最近10个</text>
  <text x="430" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Cached MC (API)</text>
  <text x="430" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Cache Edits</text>
  <text x="430" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/services/compact/</text>
</rect>

  <!-- ToolResult Budget -->
  <rect x="580" y="360" width="220" height="165" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2" rx="5"/>
  <text x="690" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B008B">ToolResult Budget</text>
  <text x="690" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Max: 150KB/msg</text>
  <text x="690" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Persist to Disk</text>
  <text x="690" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Preview: 2000B</text>
  <text x="690" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">ContentReplacement</text>
  <text x="690" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">SeenIDs/Replays</text>
  <text x="690" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/utils/toolResultStorage.ts</text>

  <!-- SessionMemory -->
  <rect x="840" y="360" width="220" height="165" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2" rx="5"/>
  <text x="950" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B008B">SessionMemory</text>
  <text x="950" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">后台Fork Agent</text>
  <text x="950" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Init: 100K tokens</text>
  <text x="950" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Update: 50K tokens</text>
  <text x="950" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">ToolCalls: 10次</text>
  <text x="950" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">写入memory.md</text>
  <text x="950" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/services/SessionMemory/</text>

  <!-- ==================== Long Term Memory (Bottom Left) ==================== -->
  <rect x="50" y="580" width="530" height="250" fill="url(#longTermGrad)" stroke="#228B22" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="315" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#006400">
    长期记忆层 (Cross-Session)
  </text>

  <!-- Memory Types -->
  <rect x="80" y="625" width="230" height="185" fill="#F0FFF0" stroke="#32CD32" stroke-width="2" rx="5"/>
  <text x="195" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#006400">Memory Types</text>
  <text x="195" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">User - 用户级</text>
  <text x="195" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Project - 项目级</text>
  <text x="195" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Local - 本地级</text>
  <text x="195" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">AutoMem - 自动</text>
  <text x="195" y="755" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">TeamMem - 团队</text>
  <text x="195" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/utils/memory/</text>

  <!-- AutoMem/Memdir -->
  <rect x="340" y="625" width="200" height="185" fill="#F0FFF0" stroke="#32CD32" stroke-width="2" rx="5"/>
  <text x="440" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#006400">Memdir (AutoMem)</text>
  <text x="440" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">~/.claude/projects/</text>
  <text x="440" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">&lt;project&gt;/memory/</text>
  <text x="440" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">MEMORY.md (200行)</text>
  <text x="440" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Daily Logs (Y/M/D)</text>
  <text x="440" y="755" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">25KB截断</text>
  <text x="440" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">src/memdir/</text>

  <!-- ==================== Persistence Layer (Bottom Right) ==================== -->
  <rect x="620" y="580" width="530" height="250" fill="url(#persistGrad)" stroke="#4169E1" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="885" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#000080">
    持久化存储层 (Persistence)
  </text>

  <!-- SessionStorage -->
  <rect x="650" y="625" width="230" height="85" fill="#E6F3FF" stroke="#4682B4" stroke-width="2" rx="5"/>
  <text x="765" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000080">SessionStorage</text>
  <text x="765" y="670" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">transcript.jsonl</text>
  <text x="765" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">sessions/&lt;id&gt;/</text>
  <text x="765" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">src/utils/sessionStorage.ts</text>

  <!-- Tool Results -->
  <rect x="650" y="725" width="110" height="85" fill="#E6F3FF" stroke="#4682B4" stroke-width="2" rx="5"/>
  <text x="705" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000080">ToolResults</text>
  <text x="705" y="770" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">tool-results/</text>
  <text x="705" y="785" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">&lt;id&gt;.json</text>
  <text x="705" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">大结果存储</text>

  <!-- History -->
  <rect x="790" y="725" width="110" height="85" fill="#E6F3FF" stroke="#4682B4" stroke-width="2" rx="5"/>
  <text x="845" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000080">History</text>
  <text x="845" y="770" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">~/.claude/</text>
  <text x="845" y="785" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">history.jsonl</text>
  <text x="845" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">全局历史</text>

  <!-- Paste Store -->
  <rect x="920" y="625" width="200" height="185" fill="#E6F3FF" stroke="#4682B4" stroke-width="2" rx="5"/>
  <text x="1020" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000080">Paste Store</text>
  <text x="1020" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">大粘贴内容存储</text>
  <text x="1020" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Hash-based</text>
  <text x="1020" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">~/.claude/paste/</text>
  <text x="1020" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">去重</text>
  <text x="1020" y="755" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">引用替换</text>
  <text x="1020" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">src/utils/pasteStore.ts</text>

  <!-- ==================== Arrows ==================== -->
  <!-- Short Term to Context Management -->
  <line x1="180" y1="250" x2="180" y2="360" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="430" y1="250" x2="430" y2="360" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="690" y1="250" x2="690" y2="360" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="950" y1="250" x2="950" y2="360" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Context Management to Long Term -->
  <line x1="280" y1="525" x2="280" y2="580" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="430" y1="525" x2="390" y2="580" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Context Management to Persistence -->
  <line x1="765" y1="525" x2="765" y2="580" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="950" y1="525" x2="1020" y2="580" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Long Term to Persistence -->
  <line x1="540" y1="705" x2="620" y2="705" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== Legend ==================== -->
  <rect x="50" y="855" width="1100" height="35" fill="#FFF" stroke="#CCC" stroke-width="1" rx="5"/>
  <text x="70" y="878" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">图例:</text>
  <rect x="120" y="863" width="20" height="15" fill="#FFE4B5"/>
  <text x="145" y="875" font-family="Arial, sans-serif" font-size="10" fill="#333">短期记忆</text>
  <rect x="220" y="863" width="20" height="15" fill="#FFB6C1"/>
  <text x="245" y="875" font-family="Arial, sans-serif" font-size="10" fill="#333">上下文管理</text>
  <rect x="340" y="863" width="20" height="15" fill="#B8E6B8"/>
  <text x="365" y="875" font-family="Arial, sans-serif" font-size="10" fill="#333">长期记忆</text>
  <rect x="440" y="863" width="20" height="15" fill="#B8D4E3"/>
  <text x="465" y="875" font-family="Arial, sans-serif" font-size="10" fill="#333">持久化</text>
  <text x="600" y="878" font-family="Arial, sans-serif" font-size="10" fill="#666">箭头表示数据流向 | 虚线表示异步/后台流程</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shortTermGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3f37c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="longTermGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4895ef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b5179e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGradient)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">Claude Code 记忆系统架构</text>

  <!-- ==================== 短期记忆层 ==================== -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="500" height="180" rx="10" fill="url(#shortTermGradient)" filter="url(#shadow)"/>
    <text x="250" y="30" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">短期记忆 (Session Memory)</text>

    <!-- Content -->
    <g transform="translate(20, 50)">
      <text x="0" y="0" fill="#fff" font-size="14">位置: .claude/session-memory/session.md</text>
      <text x="0" y="25" fill="#fff" font-size="14">触发: 每5000 tokens增长 + 3个工具调用</text>
      <text x="0" y="50" fill="#fff" font-size="14">初始化阈值: 10000 tokens</text>

      <!-- Structure -->
      <rect x="280" y="-10" width="180" height="100" rx="5" fill="rgba(255,255,255,0.2)"/>
      <text x="370" y="10" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">模板结构</text>
      <text x="290" y="30" fill="#fff" font-size="10">• Session Title</text>
      <text x="290" y="45" fill="#fff" font-size="10">• Current State</text>
      <text x="290" y="60" fill="#fff" font-size="10">• Task specification</text>
      <text x="290" y="75" fill="#fff" font-size="10">• Files and Functions</text>
      <text x="290" y="90" fill="#fff" font-size="10">• Errors &amp; Corrections</text>
    </g>
  </g>

  <!-- ==================== 上下文压缩层 ==================== -->
  <g transform="translate(650, 100)">
    <rect x="0" y="0" width="500" height="180" rx="10" fill="url(#shortTermGradient)" filter="url(#shadow)"/>
    <text x="250" y="30" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">上下文压缩 (Compaction)</text>

    <!-- Content -->
    <g transform="translate(20, 50)">
      <text x="0" y="0" fill="#fff" font-size="14">自动触发: context窗口 - 13000 tokens</text>
      <text x="0" y="25" fill="#fff" font-size="14">微压缩: 清理旧工具结果</text>
      <text x="0" y="50" fill="#fff" font-size="14">会话记忆压缩: 使用SessionMemory替代API摘要</text>

      <!-- Trigger levels -->
      <g transform="translate(280, -10)">
        <rect x="0" y="0" width="180" height="100" rx="5" fill="rgba(255,255,255,0.2)"/>
        <text x="90" y="20" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">触发级别</text>
        <text x="10" y="40" fill="#4cc9f0" font-size="10">1. 微压缩 (每轮)</text>
        <text x="10" y="55" fill="#4cc9f0" font-size="10">2. 会话记忆压缩</text>
        <text x="10" y="70" fill="#4cc9f0" font-size="10">3. 传统压缩</text>
        <text x="10" y="85" fill="#f72585" font-size="10">4. 紧急压缩 (413)</text>
      </g>
    </g>
  </g>

  <!-- ==================== 长期记忆层 ==================== -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="500" height="280" rx="10" fill="url(#longTermGradient)" filter="url(#shadow)"/>
    <text x="250" y="30" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">长期记忆 (Auto Memory)</text>

    <!-- Content -->
    <g transform="translate(20, 50)">
      <text x="0" y="0" fill="#fff" font-size="14">位置: ~/.claude/projects/&lt;repo&gt;/memory/</text>
      <text x="0" y="25" fill="#fff" font-size="14">自动提取: 每轮对话结束时后台forked agent</text>
      <text x="0" y="50" fill="#fff" font-size="14">索引: MEMORY.md (200行/25KB上限)</text>

      <!-- Memory Types -->
      <g transform="translate(0, 80)">
        <text x="0" y="0" fill="#fff" font-size="14" font-weight="bold">四种记忆类型:</text>

        <g transform="translate(20, 25)">
          <rect x="0" y="0" width="100" height="25" rx="5" fill="rgba(255,255,255,0.3)"/>
          <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="12">user</text>
          <text x="110" y="17" fill="#fff" font-size="11">用户角色、偏好、知识</text>
        </g>

        <g transform="translate(20, 55)">
          <rect x="0" y="0" width="100" height="25" rx="5" fill="rgba(255,255,255,0.3)"/>
          <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="12">feedback</text>
          <text x="110" y="17" fill="#fff" font-size="11">工作方式指导</text>
        </g>

        <g transform="translate(20, 85)">
          <rect x="0" y="0" width="100" height="25" rx="5" fill="rgba(255,255,255,0.3)"/>
          <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="12">project</text>
          <text x="110" y="17" fill="#fff" font-size="11">项目状态、目标</text>
        </g>

        <g transform="translate(20, 115)">
          <rect x="0" y="0" width="100" height="25" rx="5" fill="rgba(255,255,255,0.3)"/>
          <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="12">reference</text>
          <text x="110" y="17" fill="#fff" font-size="11">外部系统指针</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ==================== 团队记忆层 ==================== -->
  <g transform="translate(650, 320)">
    <rect x="0" y="0" width="500" height="280" rx="10" fill="url(#teamGradient)" filter="url(#shadow)"/>
    <text x="250" y="30" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">团队记忆 (Team Memory)</text>

    <!-- Content -->
    <g transform="translate(20, 50)">
      <text x="0" y="0" fill="#fff" font-size="14">位置: ~/.claude/projects/&lt;repo&gt;/memory/team/</text>
      <text x="0" y="25" fill="#fff" font-size="14">同步: 基于OAuth的API双向同步</text>
      <text x="0" y="50" fill="#fff" font-size="14">范围控制: 私有 vs 团队共享</text>

      <!-- Sync Flow -->
      <g transform="translate(0, 80)">
        <text x="0" y="0" fill="#fff" font-size="14" font-weight="bold">同步机制:</text>

        <g transform="translate(20, 25)">
          <text x="0" y="0" fill="#fff" font-size="12">• Delta上传: 只发送哈希不同的键</text>
          <text x="0" y="20" fill="#fff" font-size="12">• 乐观锁: ETag防止冲突覆盖</text>
          <text x="0" y="40" fill="#fff" font-size="12">• 冲突解决: 412时刷新checksums重试</text>
          <text x="0" y="60" fill="#fff" font-size="12">• 安全扫描: gitleaks检测密钥</text>
        </g>

        <g transform="translate(250, 25)">
          <rect x="0" y="0" width="200" height="80" rx="5" fill="rgba(255,255,255,0.2)"/>
          <text x="100" y="20" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">API限制</text>
          <text x="20" y="40" fill="#fff" font-size="10">• 单文件: 250KB</text>
          <text x="20" y="55" fill="#fff" font-size="10">• 单次PUT: 200KB</text>
          <text x="20" y="70" fill="#fff" font-size="10">• 最大重试: 3次</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ==================== 数据流 ==================== -->
  <g transform="translate(50, 650)">
    <rect x="0" y="0" width="1100" height="200" rx="10" fill="rgba(255,255,255,0.05)" stroke="#4cc9f0" stroke-width="2"/>
    <text x="550" y="30" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">上下文构建与修剪数据流</text>

    <!-- Flow diagram -->
    <g transform="translate(50, 60)">
      <!-- User Input -->
      <rect x="0" y="30" width="120" height="50" rx="5" fill="#4361ee"/>
      <text x="60" y="60" text-anchor="middle" fill="#fff" font-size="12">用户输入</text>

      <!-- Arrow -->
      <path d="M120 55 L150 55" stroke="#fff" stroke-width="2"/>
      <polygon points="150,55 140,50 140,60" fill="#fff"/>

      <!-- Messages -->
      <rect x="150" y="30" width="120" height="50" rx="5" fill="#4361ee"/>
      <text x="210" y="60" text-anchor="middle" fill="#fff" font-size="12">消息数组</text>

      <!-- Arrow -->
      <path d="M270 55 L300 55" stroke="#fff" stroke-width="2"/>
      <polygon points="300,55 290,50 290,60" fill="#fff"/>

      <!-- Token Count -->
      <rect x="300" y="30" width="120" height="50" rx="5" fill="#4cc9f0"/>
      <text x="360" y="55" text-anchor="middle" fill="#fff" font-size="11">Token计数</text>
      <text x="360" y="70" text-anchor="middle" fill="#fff" font-size="10">检查阈值</text>

      <!-- Arrow -->
      <path d="M420 55 L450 55" stroke="#fff" stroke-width="2"/>
      <polygon points="450,55 440,50 440,60" fill="#fff"/>

      <!-- Decision -->
      <polygon points="500,30 550,55 500,80 450,55" fill="#f72585"/>
      <text x="500" y="60" text-anchor="middle" fill="#fff" font-size="10">溢出?</text>

      <!-- No path -->
      <path d="M500 80 L500 110 L360 110 L360 90" stroke="#4cc9f0" stroke-width="2" fill="none"/>
      <text x="430" y="105" fill="#4cc9f0" font-size="10">否: 直接API</text>

      <!-- Yes path -->
      <path d="M550 55 L600 55" stroke="#f72585" stroke-width="2"/>
      <polygon points="600,55 590,50 590,60" fill="#f72585"/>

      <!-- Compaction -->
      <rect x="600" y="30" width="120" height="50" rx="5" fill="#f72585"/>
      <text x="660" y="55" text-anchor="middle" fill="#fff" font-size="11">执行压缩</text>
      <text x="660" y="70" text-anchor="middle" fill="#fff" font-size="10">分级策略</text>

      <!-- Arrow -->
      <path d="M720 55 L750 55" stroke="#fff" stroke-width="2"/>
      <polygon points="750,55 740,50 740,60" fill="#fff"/>

      <!-- API Call -->
      <rect x="750" y="30" width="120" height="50" rx="5" fill="#4cc9f0"/>
      <text x="810" y="60" text-anchor="middle" fill="#fff" font-size="12">API调用</text>

      <!-- Arrow -->
      <path d="M870 55 L900 55" stroke="#fff" stroke-width="2"/>
      <polygon points="900,55 890,50 890,60" fill="#fff"/>

      <!-- Memory Extract -->
      <rect x="900" y="30" width="120" height="50" rx="5" fill="#4895ef"/>
      <text x="960" y="55" text-anchor="middle" fill="#fff" font-size="11">记忆提取</text>
      <text x="960" y="70" text-anchor="middle" fill="#fff" font-size="10">(后台)</text>
    </g>

    <!-- Compaction Levels -->
    <g transform="translate(50, 140)">
      <text x="0" y="0" fill="#fff" font-size="14" font-weight="bold">压缩策略层级:</text>

      <g transform="translate(20, 20)">
        <rect x="0" y="0" width="150" height="25" rx="5" fill="#4cc9f0" opacity="0.7"/>
        <text x="75" y="17" text-anchor="middle" fill="#fff" font-size="11">1. 微压缩 (1-5K)</text>
      </g>

      <g transform="translate(180, 20)">
        <rect x="0" y="0" width="150" height="25" rx="5" fill="#4cc9f0" opacity="0.8"/>
        <text x="75" y="17" text-anchor="middle" fill="#fff" font-size="11">2. 会话记忆压缩 (20-40K)</text>
      </g>

      <g transform="translate(340, 20)">
        <rect x="0" y="0" width="150" height="25" rx="5" fill="#f72585" opacity="0.6"/>
        <text x="75" y="17" text-anchor="middle" fill="#fff" font-size="11">3. 传统压缩 (API摘要)</text>
      </g>

      <g transform="translate(500, 20)">
        <rect x="0" y="0" width="150" height="25" rx="5" fill="#f72585" opacity="0.8"/>
        <text x="75" y="17" text-anchor="middle" fill="#fff" font-size="11">4. 紧急压缩 (413响应)</text>
      </g>

      <g transform="translate(660, 20)">
        <rect x="0" y="0" width="180" height="25" rx="5" fill="#f72585"/>
        <text x="90" y="17" text-anchor="middle" fill="#fff" font-size="11">5. 断路器 (3次失败后停止)</text>
      </g>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(1050, 800)">
    <rect x="0" y="0" width="15" height="15" fill="url(#shortTermGradient)"/>
    <text x="20" y="12" fill="#fff" font-size="10">短期/压缩</text>

    <rect x="0" y="25" width="15" height="15" fill="url(#longTermGradient)"/>
    <text x="20" y="37" fill="#fff" font-size="10">长期记忆</text>

    <rect x="0" y="50" width="15" height="15" fill="url(#teamGradient)"/>
    <text x="20" y="62" fill="#fff" font-size="10">团队记忆</text>
  </g>
</svg>